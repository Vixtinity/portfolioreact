apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-ismael
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: myimg=iferlop/portfolio_app
    argocd-image-updater.argoproj.io/portfolio.update-strategy: latest
    argocd-image-updater.argoproj.io/portfolio.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/myimg.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/myimg.allow-tags: regexp:^[0-0a-f]{7,40}$
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vixtinity/portfolioreact.git
    targetRevision: main
    path: deploy/miportfolio
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true