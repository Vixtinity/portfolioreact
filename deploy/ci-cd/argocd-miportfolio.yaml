apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio-ismael
  namespace: argocd
  annotations:
    # 1. Definimos el alias 'myimg' para tu imagen
    argocd-image-updater.argoproj.io/image-list: myimg=iferlop/portfolio_app
    
    # 2. Usamos el MISMO alias para la estrategia (antes tenías 'portfolio')
    argocd-image-updater.argoproj.io/myimg.update-strategy: latest
    
    # 3. Mapeamos los campos exactos de tu values.yaml de Helm
    argocd-image-updater.argoproj.io/myimg.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/myimg.helm.image-tag: image.tag
    
    # 4. Filtro para tags (asumiendo que Jenkins usa el hash corto de Git o similar)
    # Si tus tags son simples (ej: v1, v2) puedes quitar esta línea o usar 'regexp:.*'
    argocd-image-updater.argoproj.io/myimg.allow-tags: regexp:^[0-9a-f]{7,40}$
    
    # 5. Método de escritura: 'argocd' es genial porque no necesita hacer commits en Git
    argocd-image-updater.argoproj.io/write-back-method: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vixtinity/portfolioreact.git
    targetRevision: main
    path: deploy/miportfolio
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true